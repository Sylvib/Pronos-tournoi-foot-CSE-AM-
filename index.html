<style>

<script>window.onerror=function(msg,url,line){document.getElementById('error-msg').innerHTML='❌ '+msg+'<br>Ligne: '+line;return false};</script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>
<script>
if(typeof firebase==='undefined'){document.getElementById('error-msg').textContent='❌ Firebase ne se charge pas.';}else{
try{
firebase.initializeApp({apiKey:"AIzaSyAM4fF4S31PfElSYjZ4LIm_rywavag3Rk8",authDomain:"pronos-foot-cse-am.firebaseapp.com",databaseURL:"https://pronos-foot-cse-am-default-rtdb.europe-west1.firebasedatabase.app",projectId:"pronos-foot-cse-am",storageBucket:"pronos-foot-cse-am.firebasestorage.app",messagingSenderId:"618992137257",appId:"1:618992137257:web:aa0c5ef28a7ab5786c5838"});
var db=firebase.database(),ADMIN_PIN="AM2025",PTS={ex:5,res:2,gO:5,gU:2};
var PATHS=['teams','groups','matches','results','preds','groupPreds','users','config'];
var DEF_CFG={lockPoules:false,lockQuarts:false,lockDemis:false,lockFinale:false};
var S={view:'home',teams:{},groups:{},matches:{},results:{},preds:{},groupPreds:{},users:{},config:DEF_CFG,user:null,adminOk:false,adminTab:'teams',ready:false};
var lc=0;

setTimeout(function(){if(!S.ready){document.getElementById('error-msg').innerHTML='⚠️ Connexion longue. '+lc+'/'+PATHS.length+'<br>Recharge la page.';}},10000);
db.ref('.info/connected').on('value',function(snap){if(snap.val()===true)document.getElementById('error-msg').textContent='✅ Connecté...';});

PATHS.forEach(function(p){db.ref(p).on('value',function(snap){
  S[p]=snap.val()||(p==='config'?Object.assign({},DEF_CFG):{});
  if(p==='config'){for(var k in DEF_CFG){if(S.config[k]===undefined)S.config[k]=DEF_CFG[k]}}
  lc++;document.getElementById('error-msg').textContent='Chargement '+lc+'/'+PATHS.length+'...';
  if(lc>=PATHS.length&&!S.ready){S.ready=true;document.getElementById('loading').classList.add('hidden');document.getElementById('app').classList.remove('hidden');autoLogin();checkAutoGen();render()}
  else if(S.ready){checkAutoGen();render()}
},function(err){document.getElementById('error-msg').innerHTML='❌ '+err.message;})});

function dbSet(p,v){return db.ref(p).set(v)}function dbPush(p,v){var r=db.ref(p).push();r.set(v);return r.key}function dbDel(p){return db.ref(p).remove()}
function uid(){return Math.random().toString(36).slice(2,8)}function tn(id){return S.teams[id]?S.teams[id].name:'?'}
function toArr(o){return o?Object.entries(o).map(function(e){var obj={id:e[0]};var v=e[1];if(typeof v==='object'&&v!==null){for(var k in v)obj[k]=v[k]}else{obj.value=v}return obj}):[]}
function getWDL(a,b){return a>b?'W':a<b?'L':'D'}
function mPts(pred,res){if(!res||pred.sA==null||pred.sB==null)return 0;if(pred.sA===res.sA&&pred.sB===res.sB)return PTS.ex;if(getWDL(pred.sA,pred.sB)===getWDL(res.sA,res.sB))return PTS.res;return 0}
function gPPts(pred,actual){if(!pred||!actual||actual.length<2)return 0;if(pred[0]===actual[0]&&pred[1]===actual[1])return PTS.gO;var ps=[pred[0],pred[1]].sort().join(',');var as=actual.slice(0,2).sort().join(',');if(ps===as)return PTS.gU;return 0}
function stand(gid){var g=S.groups[gid];if(!g)return[];var tids=g.teamIds||[],s={};tids.forEach(function(id){s[id]={pts:0,gf:0,ga:0}});Object.entries(S.matches).forEach(function(e){var mid=e[0],m=e[1];if(m.groupId!==gid)return;var r=S.results[mid];if(!r)return;if(s[m.tA]){s[m.tA].gf+=r.sA;s[m.tA].ga+=r.sB}if(s[m.tB]){s[m.tB].gf+=r.sB;s[m.tB].ga+=r.sA}if(r.sA>r.sB){if(s[m.tA])s[m.tA].pts+=3}else if(r.sA<r.sB){if(s[m.tB])s[m.tB].pts+=3}else{if(s[m.tA])s[m.tA].pts+=1;if(s[m.tB])s[m.tB].pts+=1}});return Object.entries(s).sort(function(a,b){return b[1].pts-a[1].pts||(b[1].gf-b[1].ga)-(a[1].gf-a[1].ga)||b[1].gf-a[1].gf}).map(function(e){return e[0]})}

// Phase lock check
function isMatchLocked(m){
  if(m.groupId)return S.config.lockPoules;
  if(m.phase==='Quart')return S.config.lockQuarts;
  if(m.phase==='Demi')return S.config.lockDemis;
  if(m.phase==='Finale')return S.config.lockFinale;
  return false;
}
function isGroupPredLocked(){return S.config.lockPoules}

// Which phases have open pronos
function getOpenPhases(){
  var open=[];
  if(!S.config.lockPoules)open.push('Poules');
  if(!S.config.lockQuarts&&phaseExists('Quart'))open.push('Quarts');
  if(!S.config.lockDemis&&phaseExists('Demi'))open.push('Demis');
  if(!S.config.lockFinale&&phaseExists('Finale'))open.push('Finale');
  return open;
}
function allGroupsDone(){var gm=Object.entries(S.matches).filter(function(e){return e[1].groupId});return gm.length>0&&gm.every(function(e){return S.results[e[0]]})}
function allPhaseDone(ph){var pm=Object.entries(S.matches).filter(function(e){return e[1].phase===ph});return pm.length>0&&pm.every(function(e){return S.results[e[0]]})}
function phaseExists(ph){return Object.values(S.matches).some(function(m){return m.phase===ph})}
function getWinner(me){var mid=me[0],m=me[1],r=S.results[mid];if(!r)return null;if(r.sA>r.sB)return m.tA;if(r.sB>r.sA)return m.tB;return null}
function getSortedGroups(){return toArr(S.groups).sort(function(a,b){return a.name.localeCompare(b.name)})}

function checkAutoGen(){
  var groups=getSortedGroups();if(groups.length<4)return;
  if(allGroupsDone()&&!phaseExists('Quart')){
    var stA=stand(groups[0].id),stB=stand(groups[1].id),stC=stand(groups[2].id),stD=stand(groups[3].id);
    if(stA.length>=2&&stB.length>=2&&stC.length>=2&&stD.length>=2){
      dbPush('matches',{tA:stA[0],tB:stC[1],phase:'Quart',groupId:null,qNum:1});
      dbPush('matches',{tA:stB[0],tB:stD[1],phase:'Quart',groupId:null,qNum:2});
      dbPush('matches',{tA:stC[0],tB:stA[1],phase:'Quart',groupId:null,qNum:3});
      dbPush('matches',{tA:stD[0],tB:stB[1],phase:'Quart',groupId:null,qNum:4});
    }
  }
  if(phaseExists('Quart')&&allPhaseDone('Quart')&&!phaseExists('Demi')){
    var q=Object.entries(S.matches).filter(function(e){return e[1].phase==='Quart'}).sort(function(a,b){return(a[1].qNum||0)-(b[1].qNum||0)});
    if(q.length===4){var w1=getWinner(q[0]),w2=getWinner(q[1]),w3=getWinner(q[2]),w4=getWinner(q[3]);if(w1&&w2&&w3&&w4){dbPush('matches',{tA:w1,tB:w2,phase:'Demi',groupId:null,sNum:1});dbPush('matches',{tA:w3,tB:w4,phase:'Demi',groupId:null,sNum:2})}}
  }
  if(phaseExists('Demi')&&allPhaseDone('Demi')&&!phaseExists('Finale')){
    var s=Object.entries(S.matches).filter(function(e){return e[1].phase==='Demi'}).sort(function(a,b){return(a[1].sNum||0)-(b[1].sNum||0)});
    if(s.length===2){var f1=getWinner(s[0]),f2=getWinner(s[1]);if(f1&&f2)dbPush('matches',{tA:f1,tB:f2,phase:'Finale',groupId:null})}
  }
}

function board(){
  var ga=toArr(S.groups);
  return toArr(S.users).map(function(u){
    var total=0,exact=0,res=0,gpPts=0;
    Object.entries(S.preds).forEach(function(e){var mid=e[0],mp=e[1];var pred=mp[u.id],r=S.results[mid];if(pred&&r){var p=mPts(pred,r);total+=p;if(p===PTS.ex)exact++;else if(p===PTS.res)res++}});
    ga.forEach(function(g){
      var gp=S.groupPreds[g.id]?S.groupPreds[g.id][u.id]:null;
      if(gp){var gm=Object.entries(S.matches).filter(function(e){return e[1].groupId===g.id});var allDone=gm.length>0&&gm.every(function(e){return S.results[e[0]]});if(allDone){var a=stand(g.id);var p=gPPts(gp,a);total+=p;gpPts+=p}}
    });
    return Object.assign({},u,{total:total,exact:exact,res:res,gpPts:gpPts});
  }).sort(function(a,b){return b.total-a.total||b.exact-a.exact});
}
function autoLogin(){try{var saved=localStorage.getItem('tournoi-user');if(saved){var u=JSON.parse(saved);if(S.users[u.id])S.user=u}}catch(e){}}

function h(tag,attrs){var el=document.createElement(tag);var kids=Array.prototype.slice.call(arguments,2);if(attrs){Object.keys(attrs).forEach(function(k){var v=attrs[k];if(k==='className')el.className=v;else if(k==='style'&&typeof v==='object')Object.assign(el.style,v);else if(k.indexOf('on')===0)el.addEventListener(k.slice(2).toLowerCase(),v);else if(k==='disabled'){if(v)el.setAttribute('disabled','')}else if(k==='selected'){if(v)el.selected=true}else el.setAttribute(k,v)})}kids.forEach(function(c){if(Array.isArray(c))c.forEach(function(cc){addChild(el,cc)});else addChild(el,c)});return el}
function addChild(el,c){if(c==null||c===false)return;if(typeof c==='string'||typeof c==='number')el.appendChild(document.createTextNode(String(c)));else el.appendChild(c)}

function render(){
  var nav=document.getElementById('nav');nav.innerHTML='';

  if(!matches.length)el.appendChild(h('div',{className:'card'},'Aucun match.'));
}

function aResults(el){var matches=toArr(S.matches),unp=matches.filter(function(m){return !S.results[m.id]}),pl=matches.filter(function(m){return S.results[m.id]});
  unp.sort(function(a,b){if(a.groupId&&!b.groupId)return -1;if(!a.groupId&&b.groupId)return 1;var o={Quart:1,Demi:2,Finale:3};return(o[a.phase]||0)-(o[b.phase]||0)});
  if(unp.length){el.appendChild(h('div',{className:'sub-title',style:{color:'var(--green)'}},'À JOUER ('+unp.length+')'));unp.forEach(function(m){var card=h('div',{className:'card match-row'});if(m.phase)card.appendChild(h('span',{className:'badge b-gold'},m.phase));card.appendChild(h('span',{className:'team-name right'},tn(m.tA)));var iA=h('input',{type:'number',min:'0',max:'99',className:'score-box'}),iB=h('input',{type:'number',min:'0',max:'99',className:'score-box'});card.appendChild(iA);card.appendChild(h('span',{style:{color:'var(--dim)',fontFamily:'var(--font-head)',fontWeight:'700'}},'—'));card.appendChild(iB);card.appendChild(h('span',{className:'team-name'},tn(m.tB)));card.appendChild(h('button',{className:'btn btn-sm',onClick:function(){var a=iA.value===''?null:parseInt(iA.value),b=iB.value===''?null:parseInt(iB.value);if(a==null||b==null)return;dbSet('results/'+m.id,{sA:a,sB:b})}},'Sauver'));el.appendChild(card)})}
  if(pl.length){el.appendChild(h('div',{className:'sub-title',style:{color:'var(--dim)',marginTop:'16px'}},'JOUÉS ('+pl.length+')'));pl.forEach(function(m){var r=S.results[m.id];var card=h('div',{className:'card match-row',style:{opacity:'.8'}});if(m.phase)card.appendChild(h('span',{className:'badge b-dim'},m.phase));card.appendChild(h('span',{className:'team-name right'},tn(m.tA)));card.appendChild(h('span',{className:'big-score'},r.sA+' — '+r.sB));card.appendChild(h('span',{className:'team-name'},tn(m.tB)));card.appendChild(h('button',{className:'btn btn-sm btn-ghost',onClick:function(){var nA=prompt('Score '+tn(m.tA)+':',r.sA),nB=prompt('Score '+tn(m.tB)+':',r.sB);if(nA!==null&&nB!==null)dbSet('results/'+m.id,{sA:parseInt(nA),sB:parseInt(nB)})}},'✏️'));card.appendChild(h('button',{className:'btn btn-sm btn-red',onClick:function(){if(confirm('Supprimer ?'))dbDel('results/'+m.id)}},'✕'));el.appendChild(card)})}
  if(!matches.length)el.appendChild(h('div',{className:'card'},'Aucun match.'));
}

// ═══ ADMIN VOIR PRONOS ═══
function aPronos(el){
  var users=toArr(S.users),matches=toArr(S.matches),groups=toArr(S.groups);
  el.appendChild(h('div',{className:'sub-title',style:{color:'var(--green)'}},'PRONOS PAR PARTICIPANT'));
  if(!users.length){el.appendChild(h('div',{className:'card'},'Aucun participant.'));return}
  users.forEach(function(u){
    var card=h('div',{className:'card'});
    var b=board().find(function(x){return x.id===u.id});
    card.appendChild(h('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:'10px'}},
      h('div',null,h('span',{style:{fontFamily:'var(--font-head)',fontSize:'16px',fontWeight:'700',color:'var(--green)'}},u.pseudo||u.name),h('span',{style:{fontSize:'12px',color:'var(--dim)',marginLeft:'8px'}},u.email)),
      h('div',{style:{fontFamily:'var(--font-title)',fontSize:'20px',color:'var(--gold)'}},(b?b.total:0)+' pts')
    ));
    // Group predictions
    groups.forEach(function(g){
      var gp=S.groupPreds[g.id]?S.groupPreds[g.id][u.id]:null;
      if(gp){card.appendChild(h('div',{className:'pred-detail'},h('span',{style:{color:'var(--gold)'}},g.name+' : '),h('span',null,'1er '+tn(gp[0])+' · 2ème '+tn(gp[1]))))}
    });
    // Match predictions
    matches.forEach(function(m){
      var pred=S.preds[m.id]?S.preds[m.id][u.id]:null;
      if(pred){
        var res=S.results[m.id];var pts=res?mPts(pred,res):null;
        card.appendChild(h('div',{className:'pred-detail'},
          h('span',{style:{color:'var(--dim)'}},tn(m.tA)+' vs '+tn(m.tB)+' : '),
          h('span',{style:{fontWeight:'600'}},pred.sA+'-'+pred.sB),
          res?h('span',{style:{color:pts>0?'var(--green)':'var(--red)',marginLeft:'8px'}},' (réel: '+res.sA+'-'+res.sB+' → +'+pts+')'):null
        ))}
    });
    el.appendChild(card);
  });
}

function aConfig(el){
  var sc=h('div',{className:'card'});sc.appendChild(h('div',{className:'label'},'Statistiques'));var users=toArr(S.users);var np=0;Object.values(S.preds).forEach(function(mp){np+=Object.keys(mp).length});var ng=0;Object.values(S.groupPreds).forEach(function(gp){ng+=Object.keys(gp).length});sc.appendChild(h('div',{style:{fontSize:'14px',lineHeight:'2.2'}},h('div',null,'👥 '+users.length+' participants'),h('div',null,'📝 '+np+' pronos matchs'),h('div',null,'🏆 '+ng+' pronos poules')));el.appendChild(sc);
  var pc=h('div',{className:'card'});pc.appendChild(h('div',{className:'label'},'Pseudo / email'));if(users.length){var tbl=h('div',{style:{fontSize:'13px',marginTop:'8px'}});users.forEach(function(u){tbl.appendChild(h('div',{style:{display:'flex',justifyContent:'space-between',padding:'5px 0',borderBottom:'1px solid var(--border)'}},h('span',{style:{color:'var(--green)',fontFamily:'var(--font-head)',fontWeight:'600'}},u.pseudo||u.name),h('span',{style:{color:'var(--dim)'}},u.email)))});pc.appendChild(tbl)}el.appendChild(pc);
  var pin=h('div',{className:'card'});pin.appendChild(h('div',{className:'label'},'Code admin'));pin.appendChild(h('div',{style:{fontSize:'13px',color:'var(--dim)'}},'PIN : ',h('strong',{style:{color:'var(--green)'}},ADMIN_PIN)));el.appendChild(pin);
  var rst=h('div',{className:'card',style:{borderColor:'var(--red)'}});rst.appendChild(h('div',{className:'label'},'Zone dangereuse'));rst.appendChild(h('button',{className:'btn btn-red',onClick:function(){if(!confirm('⚠️ TOUT SUPPRIMER ? IRRÉVERSIBLE !'))return;PATHS.forEach(function(p){dbDel(p)})}},'🗑️ Tout réinitialiser'));el.appendChild(rst);
}

}catch(e){document.getElementById('error-msg').textContent='❌ '+e.message}
}
